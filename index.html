          <div style={{ animation: 'fadeIn 0.3s ease' }}>
            <div style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid #2a2a2a', borderRadius: 14, padding: 20, marginBottom: 20 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: '#aaa' }}>Filters</span>
                <button onClick={clearFilters} style={{ background: 'none', border: 'none', color: '#E8654A', cursor: 'pointer', fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}>Clear all</button>
              </div>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
                <input value={searchText} onChange={e => setSearchText(e.target.value)} placeholder="Search..." style={{ ...sel, flex: '1 1 200px' }} />
                <select value={filterStore} onChange={e => setFilterStore(e.target.value)} style={sel}><option value="all">All Stores</option>{stores.map(s => <option key={s} value={s}>{s}</option>)}</select>
                <select value={filterPO} onChange={e => setFilterPO(e.target.value)} style={sel}><option value="all">All POs</option>{pos.map(p => <option key={p} value={p}>{p}</option>)}</select>
                <select value={filterMaterial} onChange={e => setFilterMaterial(e.target.value)} style={sel}><option value="all">All Materials</option>{materials.map(m => <option key={m} value={m}>{m}</option>)}</select>
                {types.length > 1 && <select value={filterType} onChange={e => setFilterType(e.target.value)} style={sel}><option value="all">All Types</option>{types.map(t => <option key={t} value={t}>{t}</option>)}</select>}
                <input type="date" value={filterDateFrom} onChange={e => setFilterDateFrom(e.target.value)} style={{ ...sel, colorScheme: 'dark' }} />
                <span style={{ color: '#555' }}>to</span>
                <input type="date" value={filterDateTo} onChange={e => setFilterDateTo(e.target.value)} style={{ ...sel, colorScheme: 'dark' }} />
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {filtered.length === 0 && (
                <div style={{ textAlign: 'center', padding: 60, color: '#555' }}>
                  <div style={{ fontSize: 48, marginBottom: 16 }}>📭</div>
                  <div style={{ fontSize: 16, color: '#888', marginBottom: 8, fontWeight: 600 }}>{receipts.length === 0 ? "No receipts yet" : "No receipts match your filters"}</div>
                  <div style={{ fontSize: 13, color: '#555', marginBottom: 20 }}>{receipts.length === 0 ? "Upload a PDF to get started" : "Try adjusting your filters"}</div>
                  {receipts.length === 0 && <button onClick={() => setTab("upload")} style={{ padding: '10px 20px', borderRadius: 10, border: 'none', cursor: 'pointer', background: '#E8654A', color: '#fff', fontWeight: 600, fontSize: 14, fontFamily: "'DM Sans', sans-serif" }}>Upload PDF</button>}
                </div>
              )}
              {filtered.map(r => (
                <div key={r.id} style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid #222', borderRadius: 14, padding: '18px 22px', cursor: 'pointer', transition: 'all 0.2s' }}
                  onClick={() => setViewReceipt(r)}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = '#E8654A44'; e.currentTarget.style.background = 'rgba(232,101,74,0.03)'; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = '#222'; e.currentTarget.style.background = 'rgba(255,255,255,0.02)'; }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                    <div style={{ display: 'flex', gap: 14, alignItems: 'flex-start' }}>
                      <StoreLogo store={r.store} size={38} />
                      <div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
                        <span style={{ fontSize: 16, fontWeight: 600 }}>{r.store}</span>
                        {r.type === 'refund' && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: '#E8654A22', color: '#E8654A', fontWeight: 600 }}>REFUND</span>}
                        {r.type === 'fuel' && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: '#4A90D922', color: '#4A90D9', fontWeight: 600 }}>FUEL</span>}
                        {r.type === 'food' && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: '#D4A84322', color: '#D4A843', fontWeight: 600 }}>FOOD</span>}
                      </div>
                      <div style={{ display: 'flex', gap: 16, fontSize: 12, color: '#888' }}>
                        <span>{fmtDate(r.date)}</span>
                        {r.po && <span style={{ background: '#252525', padding: '2px 8px', borderRadius: 6, color: '#aaa' }}>{r.po}</span>}
                        <span>{r.items.length} item{r.items.length !== 1 ? 's' : ''}</span>
                      </div>
                      </div>
                    </div>
                    <div style={{ textAlign: 'right', display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: r.type === 'refund' ? '#5EBB6E' : '#E8654A' }}>{fmt(r.total)}</div>
                        <button onClick={e => { e.stopPropagation(); if (window.confirm(`Remove this ${r.store} receipt from ${fmtDate(r.date)}?`)) setReceipts(prev => prev.filter(x => x.id !== r.id)); }}
                          title="Remove receipt"
                          style={{ width: 24, height: 24, borderRadius: 6, border: '1px solid transparent', background: 'transparent', color: '#444', cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s', flexShrink: 0 }}
                          onMouseEnter={e => { e.currentTarget.style.color = '#E8654A'; e.currentTarget.style.borderColor = '#E8654A33'; e.currentTarget.style.background = '#E8654A11'; }}
                          onMouseLeave={e => { e.currentTarget.style.color = '#444'; e.currentTarget.style.borderColor = 'transparent'; e.currentTarget.style.background = 'transparent'; }}
                        >✕</button>
                      </div>
                      <div style={{ fontSize: 11, color: '#555' }}>click to view</div>
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                    {r.items.slice(0, 4).map(it => <span key={it.id} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, background: '#1a1a1a', color: '#999', border: '1px solid #252525' }}>{it.name}</span>)}
                    {r.items.length > 4 && <span style={{ fontSize: 11, color: '#666', padding: '3px 6px' }}>+{r.items.length - 4} more</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === "pricing" && (<div style={{ animation: 'fadeIn 0.3s ease' }}>
          <div style={{ marginBottom: 16 }}><div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Pricing History</div><div style={{ fontSize: 13, color: '#666' }}>Track price changes across purchases</div></div>
          {receipts.length === 0 ? <div style={{ textAlign: 'center', padding: 60, color: '#555' }}>Upload receipts to see pricing history</div> : <PricingHistory receipts={receipts} onViewReceipt={r => setViewReceipt(r)} />}
        </div>)}

        {tab === "stores" && (() => {
          const customLogos = {};
          Object.entries(storeProfiles).forEach(([k, v]) => { if (v.logo) customLogos[k] = v.logo; });
          // Build store data
          const storeData = stores.map(storeName => {
            const storeReceipts = receipts.filter(r => r.store === storeName);
            const totalSpend = storeReceipts.reduce((s, r) => s + r.total, 0);
            const itemMap = {};
            storeReceipts.forEach(r => r.items.forEach(it => {
              const key = it.materialId || it.name;
              if (!itemMap[key]) itemMap[key] = { name: it.name, qty: 0, spend: 0 };
              itemMap[key].qty += it.qty; itemMap[key].spend += it.total;
            }));
            const topItems = Object.values(itemMap).sort((a, b) => b.spend - a.spend).slice(0, 5);
            const dates = storeReceipts.map(r => r.date).sort();
            const profile = storeProfiles[storeName.toLowerCase().trim()] || {};
            return { name: storeName, receipts: storeReceipts, totalSpend, topItems, dates, profile, receiptCount: storeReceipts.length };
          }).sort((a, b) => b.totalSpend - a.totalSpend);
          return (
            <div style={{ animation: 'fadeIn 0.3s ease' }}>
              <div style={{ marginBottom: 20 }}><div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Stores</div><div style={{ fontSize: 13, color: '#666' }}>Manage vendor info, upload logos, and view purchase history</div></div>
              {storeData.length === 0 ? (
                <div style={{ textAlign: 'center', padding: 60, color: '#555' }}>Upload receipts to see your stores here</div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {storeData.map(sd => (
                    <StoreCard key={sd.name} sd={sd} customLogos={customLogos} storeProfiles={storeProfiles} setStoreProfiles={setStoreProfiles} setViewReceipt={setViewReceipt} />
                  ))}
                </div>
              )}
            </div>
          );
        })()}

        {tab === "search" && <SearchPanel receipts={receipts} onViewReceipt={r => setViewReceipt(r)} />}

        {tab === "jobs" && <JobsPanel receipts={receipts} onViewReceipt={r => setViewReceipt(r)} />}

        {tab === "reports" && <ReportsPanel receipts={receipts} stores={stores} />}

        {tab === "dashboard" && (<div style={{ animation: 'fadeIn 0.3s ease' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div><div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Spending Dashboard</div><div style={{ fontSize: 13, color: '#666' }}>Analyze spending by store or material</div></div>
            <div style={{ display: 'flex', gap: 4, background: '#1a1a1a', borderRadius: 10, padding: 4 }}>
              {["store", "material"].map(v => <button key={v} onClick={() => setDashView(v)} style={{ padding: '8px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 13, background: dashView === v ? '#E8654A' : 'transparent', color: dashView === v ? '#fff' : '#888', textTransform: 'capitalize' }}>{v}</button>)}
            </div>
          </div>
          {receipts.length === 0 ? <div style={{ textAlign: 'center', padding: 60, color: '#555' }}>Upload receipts to see spending data</div> : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(400px, 1fr))', gap: 20 }}>
              <div style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid #2a2a2a', borderRadius: 14, padding: 24 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#aaa', marginBottom: 18, textTransform: 'uppercase', letterSpacing: 1 }}>Spend by {dashView}</div>
                {dashData.length > 0 ? <BarChart data={dashData} showLogos={dashView === "store"} /> : <div style={{ color: '#555', textAlign: 'center', padding: 32 }}>No data</div>}
              </div>
              <div style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid #2a2a2a', borderRadius: 14, padding: 24 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#aaa', marginBottom: 18, textTransform: 'uppercase', letterSpacing: 1 }}>Monthly Spend Trend</div>
                {monthlyTrend.length > 0 ? (<div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {monthlyTrend.map((m, i) => { const max = Math.max(...monthlyTrend.map(t => t.value), 1); return (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{ width: 50, fontSize: 11, color: '#888', fontFamily: "'Space Mono', monospace", textAlign: 'right', flexShrink: 0 }}>{m.label}</div>
                      <div style={{ flex: 1, height: 22, background: '#1a1a1a', borderRadius: 5, overflow: 'hidden' }}><div style={{ width: `${(m.value / max) * 100}%`, height: '100%', background: 'linear-gradient(90deg, #4A90D9, #4A90D9aa)', borderRadius: 5, minWidth: 2 }} /></div>
                      <div style={{ width: 80, fontSize: 12, color: '#ccc', fontFamily: "'Space Mono', monospace", textAlign: 'right', flexShrink: 0 }}>{fmt(m.value)}</div>
                    </div>); })}
                </div>) : <div style={{ color: '#555', textAlign: 'center', padding: 32 }}>No data</div>}
              </div>
              <div style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid #2a2a2a', borderRadius: 14, padding: 24, gridColumn: '1 / -1' }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: '#aaa', marginBottom: 18, textTransform: 'uppercase', letterSpacing: 1 }}>Top Purchases by Spend</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 12 }}>
                  {(() => { const map = {}; filtered.forEach(r => r.items.forEach(it => { const key = it.materialId || it.name; if (!map[key]) map[key] = { name: it.name, qty: 0, spend: 0 }; map[key].qty += it.qty; map[key].spend += it.total; }));
                    return Object.values(map).sort((a, b) => b.spend - a.spend).slice(0, 8).map((it, i) => (
                      <div key={it.name} style={{ padding: '14px 16px', background: '#151515', borderRadius: 10, border: '1px solid #222' }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: '#ddd', marginBottom: 6, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{it.name}</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between' }}><span style={{ fontSize: 12, color: '#888' }}>{it.qty} units</span><span style={{ fontSize: 13, fontWeight: 700, color: COLORS[i % COLORS.length], fontFamily: "'Space Mono', monospace" }}>{fmt(it.spend)}</span></div>
                      </div>));
                  })()}
                </div>
              </div>
            </div>
          )}
        </div>)}

        {tab === "files" && (<div style={{ animation: 'fadeIn 0.3s ease' }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Scanned Files</div>
            <div style={{ fontSize: 13, color: '#666' }}>View all uploaded PDFs and the receipts extracted from each one</div>
          </div>
          {receipts.length === 0 ? (
            <div style={{ textAlign: 'center', padding: 60, color: '#555' }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>📁</div>
              <div style={{ fontSize: 16, color: '#888', marginBottom: 8, fontWeight: 600 }}>No scanned files yet</div>
              <div style={{ fontSize: 13, color: '#555', marginBottom: 20 }}>Upload PDFs to see them here</div>
              <button onClick={() => setTab("upload")} style={{ padding: '10px 20px', borderRadius: 10, border: 'none', cursor: 'pointer', background: '#E8654A', color: '#fff', fontWeight: 600, fontSize: 14, fontFamily: "'DM Sans', sans-serif" }}>Upload PDF</button>
            </div>
          ) : (() => {
            // Group receipts by fileName
            const fileGroups = {};
            receipts.forEach(r => {
              const fname = r.fileName || 'Unknown File';
              if (!fileGroups[fname]) fileGroups[fname] = { name: fname, receipts: [], totalSpend: 0, stores: new Set(), dates: new Set(), types: new Set() };
              fileGroups[fname].receipts.push(r);
              fileGroups[fname].totalSpend += r.total;
              fileGroups[fname].stores.add(r.store);
              fileGroups[fname].dates.add(r.date);
              if (r.type) fileGroups[fname].types.add(r.type);
            });
            const files = Object.values(fileGroups).sort((a, b) => {
              const aDate = Math.max(...a.receipts.map(r => new Date(r.date + 'T00:00:00').getTime()));
              const bDate = Math.max(...b.receipts.map(r => new Date(r.date + 'T00:00:00').getTime()));
              return bDate - aDate;
            });
            return (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                {files.map(file => {
                  const storeList = [...file.stores];
                  const dateRange = [...file.dates].sort();
                  const itemCount = file.receipts.reduce((s, r) => s + r.items.length, 0);
                  return (
                    <div key={file.name} style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid #222', borderRadius: 14, overflow: 'hidden' }}>
                      {/* File header */}
                      <div style={{ padding: '18px 22px', display: 'flex', alignItems: 'center', gap: 16 }}>
                        <div style={{ width: 44, height: 44, borderRadius: 12, background: '#1a1a1a', border: '1px solid #2a2a2a', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>📄</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 15, fontWeight: 600, color: '#eee', marginBottom: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{file.name}</div>
                          <div style={{ display: 'flex', gap: 12, fontSize: 12, color: '#888', flexWrap: 'wrap', alignItems: 'center' }}>
                            <span>{file.receipts.length} receipt{file.receipts.length !== 1 ? 's' : ''}</span>
                            <span>·</span>
                            <span>{itemCount} item{itemCount !== 1 ? 's' : ''}</span>
                            <span>·</span>
                            <span>{dateRange.length === 1 ? fmtDate(dateRange[0]) : `${fmtDate(dateRange[0])} – ${fmtDate(dateRange[dateRange.length - 1])}`}</span>
                          </div>
                        </div>
                        <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                          {storeList.slice(0, 3).map(s => <StoreLogo key={s} store={s} size={26} />)}
                          {storeList.length > 3 && <span style={{ fontSize: 11, color: '#666', alignSelf: 'center' }}>+{storeList.length - 3}</span>}
                        </div>
                        <div style={{ textAlign: 'right', flexShrink: 0, marginLeft: 8 }}>
                          <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: '#E8654A' }}>{fmt(file.totalSpend)}</div>
                        </div>
                        <button onClick={() => {
                          if (window.confirm(`Delete all ${file.receipts.length} receipt${file.receipts.length !== 1 ? 's' : ''} from "${file.name}"?\n\nThis will remove them from all tabs including pricing history and dashboard.`)) {
                            const idsToRemove = new Set(file.receipts.map(r => r.id));
                            setReceipts(prev => prev.filter(r => !idsToRemove.has(r.id)));
                          }
                        }}
                          title="Delete all receipts from this file"
                          style={{ width: 34, height: 34, borderRadius: 8, border: '1px solid #E8654A22', background: '#E8654A08', color: '#E8654A88', cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s', flexShrink: 0 }}
                          onMouseEnter={e => { e.currentTarget.style.color = '#E8654A'; e.currentTarget.style.background = '#E8654A22'; e.currentTarget.style.borderColor = '#E8654A44'; }}
                          onMouseLeave={e => { e.currentTarget.style.color = '#E8654A88'; e.currentTarget.style.background = '#E8654A08'; e.currentTarget.style.borderColor = '#E8654A22'; }}
                        >🗑️</button>
                      </div>
                      {/* Receipt list within this file */}
                      <div style={{ borderTop: '1px solid #1e1e1e' }}>
                        {file.receipts.map((r, ri) => (
                          <div key={r.id} style={{
                            padding: '10px 22px 10px 82px', borderBottom: ri < file.receipts.length - 1 ? '1px solid #1a1a1a' : 'none',
                            display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', transition: 'background 0.15s',
                          }}
                            onClick={() => setViewReceipt(r)}
                            onMouseEnter={e => e.currentTarget.style.background = 'rgba(232,101,74,0.03)'}
                            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                          >
                            <StoreLogo store={r.store} size={24} />
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 13, fontWeight: 500, color: '#ccc', display: 'flex', alignItems: 'center', gap: 8 }}>
                                {r.store}
                                {r.type === 'refund' && <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#E8654A22', color: '#E8654A', fontWeight: 600 }}>REFUND</span>}
                                {r.type === 'fuel' && <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#4A90D922', color: '#4A90D9', fontWeight: 600 }}>FUEL</span>}
                                {r.type === 'food' && <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: '#D4A84322', color: '#D4A843', fontWeight: 600 }}>FOOD</span>}
                              </div>
                              <div style={{ fontSize: 11, color: '#666' }}>
                                {fmtDate(r.date)}{r.po ? ` · ${r.po}` : ''} · {r.items.length} item{r.items.length !== 1 ? 's' : ''}
                              </div>
                            </div>
                            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: r.type === 'refund' ? '#5EBB6E' : '#ddd' }}>{fmt(r.total)}</div>
                            <div style={{ fontSize: 10, color: '#555' }}>view →</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>)}

        {tab === "upload" && (<div style={{ animation: 'fadeIn 0.3s ease', maxWidth: 600, margin: '0 auto' }}>
          <div style={{ marginBottom: 20 }}><div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Upload Receipts</div><div style={{ fontSize: 13, color: '#666' }}>Upload PDF receipts — Claude AI reads each page and extracts real line items, prices, and totals</div></div>
          <UploadPanel queue={uploadQueue} addToQueue={addToQueue} clearQueue={clearUploadQueue} removeFromQueue={removeFromQueue} totalResult={uploadTotalResult} onSwitchToReceipts={() => setTab("receipts")} />
          <div style={{ marginTop: 24, padding: 20, background: 'rgba(255,255,255,0.02)', border: '1px solid #2a2a2a', borderRadius: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: '#aaa', marginBottom: 12 }}>Supported Formats</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[["🏗️","Menards","Register receipts, picking tickets, gate passes"],["🔶","Home Depot","Register receipts with PO/Job Name, refunds"],["⛽","Gas Stations","Fuel receipts with gallons and price/gal"],["🍔","Food / Other","Convenience store, restaurant, retail"]].map(([icon, title, desc], i) => (
                <div key={i} style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
                  <div style={{ width: 40, height: 40, borderRadius: 10, background: '#1a1a1a', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, flexShrink: 0 }}>{icon}</div>
                  <div><div style={{ fontSize: 14, fontWeight: 600, color: '#ddd' }}>{title}</div><div style={{ fontSize: 12, color: '#777' }}>{desc}</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>)}
      </div>
      {viewReceipt && <ReceiptViewer receipt={viewReceipt} onClose={() => setViewReceipt(null)} />}
    </div>
    </CustomLogosContext.Provider>
  );
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ReceiptManager));
  </script>
</body>
</html>
